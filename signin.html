<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · meet</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23006BFF%22/><text x=%2250%22 y=%2268%22 font-size=%2260%22 font-family=%22system-ui%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22white%22>M</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f7f5; --card:#ffffff; --ink:#0b0b0f; --ink-2:#3a3a43;
    --muted:#8b8b95; --line:#e7e7e4; --line-2:#efefec;
    --brand:#006BFF; --brand-ink:#0052cc; --brand-soft:#e8f0ff;
    --radius:14px; --radius-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; font-size:15px; line-height:1.5; min-height:100vh;
    display:flex; flex-direction:column;
  }
  .shell{flex:1; max-width:440px; width:100%; margin:0 auto; padding:28px 20px 40px}
  header.topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:30px}
  .logo{display:flex; align-items:center; gap:8px; font-weight:600; color:var(--ink); text-decoration:none; font-size:14px; letter-spacing:-0.01em}
  .logo-mark{width:22px; height:22px; border-radius:6px; background:linear-gradient(135deg,#006BFF 0%,#3b8eff 100%); display:grid; place-items:center; color:#fff; font-weight:700; font-size:12px}
  .topbar-right{display:flex; gap:14px; align-items:center; color:var(--muted); font-size:13px}
  .topbar-right a{color:var(--ink-2); text-decoration:none}
  .topbar-right a:hover{color:var(--ink)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:34px 32px; box-shadow:0 1px 0 rgba(10,10,15,0.02), 0 20px 40px -25px rgba(10,10,15,0.08)}
  .auth-title{font-family:'Fraunces', Georgia, serif; font-weight:500; font-size:26px; letter-spacing:-0.02em; margin:0 0 6px; text-align:center}
  .auth-sub{color:var(--muted); text-align:center; font-size:14px; margin:0 0 24px}

  .sso-btn{
    width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
    padding:11px 14px; border:1.5px solid var(--line); background:#fff; border-radius:var(--radius-sm);
    font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; color:var(--ink);
    transition:background 0.12s ease, border-color 0.12s ease;
  }
  .sso-btn:hover{background:var(--line-2)}
  .sso-btn + .sso-btn{margin-top:10px}

  .divider{
    display:flex; align-items:center; gap:10px; margin:22px 0; color:var(--muted); font-size:12px;
  }
  .divider::before, .divider::after{content:''; flex:1; height:1px; background:var(--line)}

  .form-row{margin-bottom:14px}
  .form-row label{display:block; font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px; display:flex; justify-content:space-between}
  .form-row label a{color:var(--brand-ink); text-decoration:none; font-weight:500; font-size:12.5px}
  .form-row label a:hover{text-decoration:underline}
  .form-row input{
    width:100%; padding:10px 12px; border:1.5px solid var(--line);
    border-radius:var(--radius-sm); font-size:14px; font-family:inherit; color:var(--ink);
    background:#fff; outline:none; transition:border-color 0.12s ease, box-shadow 0.12s ease;
  }
  .form-row input:focus{border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,107,255,0.12)}
  .pw-wrap{position:relative}
  .pw-toggle{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; padding:4px; cursor:pointer; color:var(--muted); border-radius:6px;
  }
  .pw-toggle:hover{color:var(--ink-2); background:var(--line-2)}

  .checkbox-row{display:flex; align-items:center; gap:8px; margin-bottom:18px; font-size:13px; color:var(--ink-2)}
  .checkbox-row input{width:auto}

  .btn-primary{
    width:100%; background:var(--brand); color:#fff; border:none; border-radius:var(--radius-sm);
    padding:11px 18px; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit;
    transition:background 0.12s ease;
  }
  .btn-primary:hover{background:var(--brand-ink)}
  .btn-primary:disabled{opacity:0.5; cursor:not-allowed}

  .error{
    display:none; background:#fee2e2; border:1px solid #fca5a5; color:#991b1b;
    padding:10px 12px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px;
  }
  .error.on{display:block; animation:shake 0.3s ease}
  @keyframes shake{0%,100%{transform:none} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)}}

  .foot-link{text-align:center; margin-top:20px; font-size:14px; color:var(--ink-2)}
  .foot-link a{color:var(--brand-ink); text-decoration:none; font-weight:600}
  .foot-link a:hover{text-decoration:underline}

  footer.foot{margin-top:24px; text-align:center; color:var(--muted); font-size:12px}
  footer.foot a{color:var(--muted); text-decoration:none; margin:0 6px}
  footer.foot a:hover{color:var(--ink-2)}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <a class="logo" href="index.html">
      <span class="logo-mark">M</span>
      <span>meet/mahammad</span>
    </a>
    <div class="topbar-right">
      <a href="help.html">Help</a>
    </div>
  </header>

  <div class="card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your meet account</p>

    <button class="sso-btn" onclick="fakeSso('Google')">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#EA4335" d="M12 10.2v3.9h5.4c-.2 1.4-1.7 4.1-5.4 4.1-3.2 0-5.9-2.7-5.9-6s2.7-6 5.9-6c1.9 0 3.1.8 3.8 1.4l2.6-2.5C16.8 3.5 14.6 2.5 12 2.5 6.8 2.5 2.6 6.7 2.6 12s4.2 9.5 9.4 9.5c5.4 0 9-3.8 9-9.2 0-.6-.1-1.1-.2-1.6H12z"/>
      </svg>
      <span>Continue with Google</span>
    </button>
    <button class="sso-btn" onclick="fakeSso('Microsoft')">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <rect x="2" y="2" width="9" height="9" fill="#F25022"/>
        <rect x="13" y="2" width="9" height="9" fill="#7FBA00"/>
        <rect x="2" y="13" width="9" height="9" fill="#00A4EF"/>
        <rect x="13" y="13" width="9" height="9" fill="#FFB900"/>
      </svg>
      <span>Continue with Microsoft</span>
    </button>

    <div class="divider">or sign in with email</div>

    <div class="error" id="err">Incorrect email or password. Please try again.</div>

    <form onsubmit="fakeLogin(event)">
      <div class="form-row">
        <label>Email</label>
        <input id="f-email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-row">
        <label>
          <span>Password</span>
          <a href="#" onclick="forgot();return false;">Forgot password?</a>
        </label>
        <div class="pw-wrap">
          <input id="f-pw" type="password" placeholder="Your password" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-ic"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="checkbox-row">
        <input id="f-remember" type="checkbox" />
        <label for="f-remember" style="margin:0;display:inline">Keep me signed in for 30 days</label>
      </div>
      <button class="btn-primary" id="submit-btn" type="submit">Sign in</button>
    </form>

    <p class="foot-link">New to meet? <a href="signup.html">Create an account</a></p>
  </div>

  <footer class="foot">
    <span>Powered by <strong style="color:var(--ink-2)">meet</strong></span>
    <span> · </span>
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
    <a href="report-abuse.html">Report abuse</a>
  </footer>
</div>

<script>
  function togglePw(){
    const inp = document.getElementById('f-pw');
    const ic = document.getElementById('eye-ic');
    if (inp.type === 'password'){
      inp.type = 'text';
      ic.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      ic.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  function fakeLogin(e){
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('err');
    err.classList.remove('on');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Sign in';
      err.classList.add('on');
    }, 900 + Math.random()*500);
  }

  function fakeSso(provider){
    alert(`${provider} sign-in is not configured in this demo.`);
  }

  function forgot(){
    const email = document.getElementById('f-email').value.trim();
    if (email){
      alert(`If an account exists for ${email}, a password-reset link will be sent shortly.`);
    } else {
      alert('Enter your email address first, then click "Forgot password".');
    }
  }
</script>
</body>
</html>
